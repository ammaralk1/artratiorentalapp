name: Build & Deploy (rclone)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

      - name: Create backend config from secret
        env:
          BACKEND_CONFIG_PHP: ${{ secrets.BACKEND_CONFIG_PHP }}
        run: |
          set -euo pipefail
          if [ -z "${BACKEND_CONFIG_PHP:-}" ]; then
            echo "BACKEND_CONFIG_PHP secret is empty." >&2
            exit 1
          fi
          mkdir -p backend
          # Decode the Base64 config for the dedicated FTPS upload step.
          # The rclone sync excludes backend/config.php to avoid sending secrets over plain FTP.
          printf '%s' "${BACKEND_CONFIG_PHP}" | base64 -d > backend/config.php

      - name: Build
        run: npm run build

      - name: Upload localized public pages to FTP server
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USE_TLS: ${{ secrets.FTP_USE_TLS }}
          FTP_SKIP_TLS_VERIFY: ${{ secrets.FTP_SKIP_TLS_VERIFY }}
        run: |
          set -euo pipefail
          FTP_PORT="${FTP_PORT:-21}"
          upload_file() {
            local file="$1"
            local url="ftp://${FTP_SERVER}:${FTP_PORT}/${file}"
            local args=(
              --fail --show-error --silent
              --connect-timeout 20 --max-time 120
              --ftp-create-dirs --ftp-method nocwd --ftp-pasv
              --user "${FTP_USERNAME}:${FTP_PASSWORD}"
              -T "${file}"
              "${url}"
            )
            if [ "${FTP_USE_TLS:-false}" = "true" ]; then
              args+=( --ftp-ssl --ssl-reqd )
            fi
            if [ "${FTP_USE_TLS:-false}" = "true" ] && [ "${FTP_SKIP_TLS_VERIFY:-false}" = "true" ]; then
              args+=( --insecure )
            fi
            curl "${args[@]}"
          }
          while IFS= read -r file; do
            upload_file "${file}"
          done < <(find dist/public-localized -type f | sort)

      - name: Upload backend config to FTP server
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USE_TLS: ${{ secrets.FTP_USE_TLS }}
          FTP_SKIP_TLS_VERIFY: ${{ secrets.FTP_SKIP_TLS_VERIFY }}
        run: |
          set -euo pipefail
          FTP_PORT="${FTP_PORT:-21}"
          CURL_ARGS=(
            --fail --show-error --silent
            --connect-timeout 20 --max-time 120
            --ftp-create-dirs --ftp-method nocwd --ftp-pasv
            --user "${FTP_USERNAME}:${FTP_PASSWORD}"
            -T backend/config.php
            "ftp://${FTP_SERVER}:${FTP_PORT}/backend/config.php"
          )
          if [ "${FTP_USE_TLS:-false}" = "true" ]; then
            CURL_ARGS+=( --ftp-ssl --ssl-reqd )
          fi
          if [ "${FTP_USE_TLS:-false}" = "true" ] && [ "${FTP_SKIP_TLS_VERIFY:-false}" = "true" ]; then
            CURL_ARGS+=( --insecure )
          fi
          for attempt in 1 2 3; do
            if curl "${CURL_ARGS[@]}"; then
              exit 0
            fi
            echo "backend/config.php upload failed on attempt ${attempt}." >&2
            sleep 5
          done
          echo "::warning::backend/config.php upload failed after retries; continuing because the deployment sync excludes runtime secrets and production already has this file."

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Sync project to FTP server
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USE_TLS: ${{ secrets.FTP_USE_TLS }}
          FTP_SKIP_TLS_VERIFY: ${{ secrets.FTP_SKIP_TLS_VERIFY }}
        run: |
          set -euo pipefail
          FTP_PORT="${FTP_PORT:-21}"
          RCLONE_CONFIG_ARGS=(
            host "${FTP_SERVER}"
            user "${FTP_USERNAME}"
            pass "${FTP_PASSWORD}"
            port "${FTP_PORT}"
            tls false
          )
          if [ "${FTP_USE_TLS:-false}" = "true" ]; then
            RCLONE_CONFIG_ARGS+=( explicit_tls true )
          fi
          if [ "${FTP_USE_TLS:-false}" = "true" ] && [ "${FTP_SKIP_TLS_VERIFY:-false}" = "true" ]; then
            RCLONE_CONFIG_ARGS+=( no_check_certificate true )
          fi
          rclone config create site ftp \
            "${RCLONE_CONFIG_ARGS[@]}"
          rclone sync ./ site:/ \
            --transfers 8 \
            --checkers 10 \
            --ftp-concurrency 4 \
            --exclude "/.git/**" \
            --exclude "/.github/**" \
            --exclude "/node_modules/**" \
            --exclude "/art-ratio.com/node_modules/**" \
            --exclude "/backend/config.php" \
            --exclude "/tests/**" \
            --exclude "/README.md" \
            --exclude "/package-lock.json" \
            --exclude "/package.json" \
            --exclude "/art-ratio.com/package-lock.json" \
            --exclude "/art-ratio.com/package.json" \
            --exclude "/deploy-test*.txt" \
            --exclude "/vite.config.js" \
            --exclude "/vitest.config.js" \
            --exclude "/.gitignore" \
            --exclude "/src/**" \
            --exclude "/ART RATIO APP.code-workspace" \
            --exclude "/eqouipment list for app.xlsx" \
            --exclude "/main" \
            --exclude "/public/**" \
            --exclude "/deploy-test-latest.txt"
