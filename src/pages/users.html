<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- @include "./_partials/manager-page-head.html" {"titleKey":"users.nav.brand","titleText":"🛡️ إدارة المستخدمين"} -->
</head>
<!-- @include "./_partials/compact-manager-shell.html" {"bodyClass":"users-page","activePage":"users","greetingLabelKey":"home.users.title","greetingLabelText":"إدارة المستخدمين","pageScript":"/src/scripts/users.js"} -->
<template data-slot="greetingSummary">
  <p class="text-sm text-base-content/60" data-i18n data-i18n-key="users.form.subtitle">يمكنك إضافة مستخدم جديد، تعديل بياناته، أو إعادة تعيين كلمة المرور.</p>
  <p class="text-sm text-base-content/70" data-i18n data-i18n-key="users.table.subtitle">استعرض جميع المستخدمين، مع إمكانية التعديل أو حذف الحسابات، والاطلاع على السجلات.</p>
</template>
<template data-slot="greetingActions">
  <a href="#user-form" class="btn btn-primary btn-sm" data-i18n data-i18n-key="users.form.actions.submit">💾 حفظ المستخدم</a>
  <a href="#users-table" class="btn btn-outline btn-sm" data-i18n data-i18n-key="users.table.title">👥 قائمة المستخدمين</a>
</template>
<template data-slot="mainContent">
  <section class="ui-card ui-card--content glass-card users-card space-y-6" id="users-hero">
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div class="surface-heading-stack">
        <h2 class="text-2xl font-bold text-base-content" data-i18n data-i18n-key="users.nav.brand">🛡️ إدارة المستخدمين</h2>
        <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="users.form.subtitle">يمكنك إضافة مستخدم جديد، تعديل بياناته، أو إعادة تعيين كلمة المرور.</p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <span class="ui-badge ui-badge--outline badge badge-outline badge-error badge-lg" data-i18n data-i18n-key="users.form.adminOnly">متاح للمسؤولين فقط</span>
        <button type="button" class="ui-button ui-button--outline btn btn-outline btn-sm" id="refresh-users-btn" data-i18n data-i18n-key="users.actions.refresh">🔄 تحديث القائمة</button>
      </div>
    </div>
  </section>

  <div class="alert alert-error" role="alert" id="users-error" hidden></div>

  <section class="users-stats-grid" id="users-stats">
    <article class="ui-card ui-card--content glass-card ui-stat-card users-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="users.stats.total">إجمالي المستخدمين</span>
      <strong class="ui-stat-card__value" id="users-stat-total">0</strong>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card users-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="users.stats.admins">المسؤولون</span>
      <strong class="ui-stat-card__value" id="users-stat-admins">0</strong>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card users-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="users.stats.managers">المديرون</span>
      <strong class="ui-stat-card__value" id="users-stat-managers">0</strong>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card users-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="users.stats.technicians">الفنيون</span>
      <strong class="ui-stat-card__value" id="users-stat-technicians">0</strong>
    </article>
  </section>

  <section class="ui-card ui-card--content glass-card users-card space-y-6" id="user-form-section">
    <header class="surface-heading-stack">
      <h2 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="users.form.title">➕ إضافة أو تعديل مستخدم</h2>
      <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="users.form.subtitle">يمكنك إضافة مستخدم جديد، تعديل بياناته، أو إعادة تعيين كلمة المرور.</p>
    </header>
    <form id="user-form" class="space-y-6" autocomplete="off">
      <input type="hidden" id="user-id">
      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
        <div class="flex flex-col gap-2">
          <label for="user-username" class="font-medium text-base-content" data-i18n data-i18n-key="users.form.fields.username">👤 اسم المستخدم</label>
          <input type="text" class="ui-input input input-bordered w-full" id="user-username" required maxlength="100" data-i18n data-i18n-placeholder-key="users.form.placeholders.username" placeholder="admin" autocomplete="off">
        </div>
        <div class="flex flex-col gap-2">
          <label for="user-password" class="font-medium text-base-content" data-i18n data-i18n-key="users.form.fields.password">🔑 كلمة المرور</label>
          <input type="password" class="ui-input input input-bordered w-full" id="user-password" minlength="8" maxlength="255" data-i18n data-i18n-placeholder-key="users.form.placeholders.password" placeholder="********" autocomplete="new-password">
          <p class="text-sm text-base-content/60" data-i18n data-i18n-key="users.form.help.password">متطلبات كلمة المرور: 8 أحرف على الأقل.</p>
        </div>
        <div class="flex flex-col gap-2">
          <label for="user-role" class="font-medium text-base-content" data-i18n data-i18n-key="users.form.fields.role">🎯 الصلاحية</label>
          <select class="ui-select select select-bordered w-full" id="user-role" required>
            <option value="" data-i18n data-i18n-key="users.form.selectRole">اختر الصلاحية</option>
            <option value="admin" data-i18n data-i18n-key="users.roles.admin">مسؤول</option>
            <option value="manager" data-i18n data-i18n-key="users.roles.manager">مدير</option>
            <option value="technician" data-i18n data-i18n-key="users.roles.technician">فني</option>
          </select>
        </div>
      </div>
      <div class="flex flex-wrap justify-end gap-2">
        <button type="button" class="ui-button ui-button--outline btn btn-outline btn-sm d-none" id="user-cancel-btn" data-i18n data-i18n-key="users.form.actions.cancel">إلغاء</button>
        <button type="submit" class="ui-button ui-button--primary btn btn-primary" data-i18n data-i18n-key="users.form.actions.submit">💾 حفظ المستخدم</button>
      </div>
    </form>
  </section>

  <section class="ui-card ui-card--content glass-card users-card space-y-6" id="users-table-section">
    <header class="surface-heading-stack">
      <h2 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="users.table.title">👥 قائمة المستخدمين</h2>
      <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="users.table.subtitle">استعرض جميع المستخدمين، مع إمكانية التعديل أو حذف الحسابات، والاطلاع على السجلات.</p>
    </header>
    <div class="grid gap-4 md:grid-cols-2">
      <div class="flex flex-col gap-2">
        <label for="users-search" class="font-medium text-base-content" data-i18n data-i18n-key="users.table.searchLabel">بحث</label>
        <input type="search" class="ui-input input input-bordered w-full" id="users-search" data-i18n data-i18n-placeholder-key="users.table.search" placeholder="ابحث بالاسم أو الصلاحية">
      </div>
    </div>
    <div class="users-table-wrapper overflow-x-auto">
      <table class="ui-table table table-hover align-middle users-table surface-table" id="users-table">
        <thead class="table-light users-table-head">
          <tr>
            <th data-i18n data-i18n-key="users.table.headers.username">👤 اسم المستخدم</th>
            <th data-i18n data-i18n-key="users.table.headers.role">🎯 الصلاحية</th>
            <th data-i18n data-i18n-key="users.table.headers.lastLogin">آخر تسجيل دخول</th>
            <th data-i18n data-i18n-key="users.table.headers.createdAt">تاريخ الإنشاء</th>
            <th data-i18n data-i18n-key="users.table.headers.sessions">سجلات الجلسات</th>
            <th data-i18n data-i18n-key="users.table.headers.activity">سجلات النشاط</th>
            <th data-i18n data-i18n-key="users.table.headers.actions">⚙️ الإجراءات</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="7" class="text-center text-muted" data-i18n data-i18n-key="users.table.loading">⏳ جارٍ تحميل المستخدمين...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="list-pagination" id="users-pagination" hidden></div>
  </section>
</template>
<template data-slot="afterShell">
  <div class="modal fade users-modal" id="userLogsModal" tabindex="-1" aria-labelledby="userLogsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="ui-modal__content modal-content users-modal-content">
        <div class="ui-modal__header modal-header users-modal-header">
          <h5 class="modal-title" id="userLogsModalLabel" data-i18n data-i18n-key="users.logs.title">📜 سجلات المستخدم</h5>
          <button type="button" class="btn-close" data-modal-close aria-label="Close"></button>
        </div>
        <div class="ui-modal__body modal-body users-modal-body">
          <div class="row g-4">
            <div class="col-lg-6">
              <h6 class="users-logs-heading" data-i18n data-i18n-key="users.logs.sessionsTitle">🕒 سجلات الجلسات</h6>
              <div class="ui-table-shell table-responsive border rounded p-2 users-logs-table-wrapper" id="user-sessions-container">
                <table class="ui-table table table-sm mb-0 users-logs-table">
                  <thead class="users-logs-table-head">
                    <tr>
                      <th data-i18n data-i18n-key="users.logs.headers.login">تسجيل الدخول</th>
                      <th data-i18n data-i18n-key="users.logs.headers.logout">تسجيل الخروج</th>
                      <th data-i18n data-i18n-key="users.logs.headers.ip">عنوان IP</th>
                    </tr>
                  </thead>
                  <tbody id="user-sessions-body">
                    <tr>
                      <td colspan="3" class="text-center text-muted" data-i18n data-i18n-key="users.logs.emptySessions">لا توجد سجلات جلسات متاحة.</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div class="col-lg-6">
              <h6 class="users-logs-heading" data-i18n data-i18n-key="users.logs.activityTitle">📘 سجلات النشاط</h6>
              <div class="ui-table-shell table-responsive border rounded p-2 users-logs-table-wrapper" id="user-activity-container">
                <table class="ui-table table table-sm mb-0 users-logs-table">
                  <thead class="users-logs-table-head">
                    <tr>
                      <th data-i18n data-i18n-key="users.logs.headers.timestamp">التاريخ</th>
                      <th data-i18n data-i18n-key="users.logs.headers.action">الإجراء</th>
                      <th data-i18n data-i18n-key="users.logs.headers.details">تفاصيل</th>
                    </tr>
                  </thead>
                  <tbody id="user-activity-body">
                    <tr>
                      <td colspan="3" class="text-center text-muted" data-i18n data-i18n-key="users.logs.emptyActivity">لا توجد سجلات نشاط متاحة.</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        <div class="ui-modal__footer modal-footer">
          <button type="button" class="ui-button ui-button--secondary btn btn-secondary" data-modal-close data-i18n data-i18n-key="users.logs.actions.close">إغلاق</button>
        </div>
      </div>
    </div>
  </div>
</template>
<template data-slot="pageScripts">
  <script type="module" src="/src/scripts/translations/users.js"></script>
</template>
</html>
