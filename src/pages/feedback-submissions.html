<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- @include "./_partials/manager-page-head.html" {"titleKey":"feedbackSubmissions.title","titleText":"إدارة آراء العملاء"} -->
</head>
<!-- @include "./_partials/compact-manager-shell.html" {"bodyClass":"feedback-submissions-page","activePage":"feedback-submissions","greetingLabelKey":"feedbackSubmissions.title","greetingLabelText":"إدارة آراء العملاء","pageScript":"/src/scripts/feedbackSubmissions.js"} -->
<template data-slot="greetingSummary">
  <p class="text-sm text-base-content/60" data-i18n data-i18n-key="feedbackSubmissions.subtitle">مراجعة تقييمات العملاء، فرز الملاحظات المهمة، وتوثيق الردود وخطوات التحسين.</p>
</template>
<template data-slot="greetingActions">
  <a href="#feedback-submissions-table-card" class="ui-button ui-button--primary btn btn-primary btn-sm" data-i18n data-i18n-key="feedbackSubmissions.actions.openList">📋 فتح القائمة</a>
  <a href="#feedback-detail-card" class="ui-button ui-button--outline btn btn-outline btn-sm" data-i18n data-i18n-key="feedbackSubmissions.actions.openDetails">🧾 فتح التفاصيل</a>
</template>
<template data-slot="mainContent">
  <section class="ui-card ui-card--content glass-card feedback-submissions-hero-shell space-y-2">
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div class="feedback-submissions-hero-copy">
        <h2 class="text-2xl font-bold text-base-content" data-i18n data-i18n-key="feedbackSubmissions.title">إدارة آراء العملاء</h2>
        <p class="text-sm text-base-content/70" data-i18n data-i18n-key="feedbackSubmissions.subtitle">مراجعة تقييمات العملاء، فرز الملاحظات المهمة، وتوثيق الردود وخطوات التحسين.</p>
      </div>
      <button type="button" class="ui-button ui-button--outline btn btn-outline btn-sm" id="feedback-submissions-refresh" data-i18n data-i18n-key="actions.refresh">🔄 تحديث البيانات</button>
    </div>
  </section>

  <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4 feedback-submissions-stats-grid" id="feedback-submissions-stats">
    <article class="ui-card ui-card--content glass-card ui-stat-card feedback-submissions-stat-card">
      <div class="ui-stat-card__label" data-i18n data-i18n-key="feedbackSubmissions.stats.new">جديدة</div>
      <div class="ui-stat-card__value" id="feedback-stat-new">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card feedback-submissions-stat-card">
      <div class="ui-stat-card__label" data-i18n data-i18n-key="feedbackSubmissions.stats.followUpNeeded">تحتاج متابعة</div>
      <div class="ui-stat-card__value" id="feedback-stat-follow-up">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card feedback-submissions-stat-card">
      <div class="ui-stat-card__label" data-i18n data-i18n-key="feedbackSubmissions.stats.highRated">تقييمات 4 و5</div>
      <div class="ui-stat-card__value" id="feedback-stat-high-rated">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card feedback-submissions-stat-card">
      <div class="ui-stat-card__label" data-i18n data-i18n-key="feedbackSubmissions.stats.responded">تم الرد</div>
      <div class="ui-stat-card__value" id="feedback-stat-responded">0</div>
    </article>
  </section>

  <section class="ui-card ui-card--content glass-card feedback-submissions-table-shell space-y-5" id="feedback-submissions-table-card">
    <div class="grid gap-4 md:grid-cols-[220px_180px_minmax(0,1fr)] feedback-submissions-filter-grid">
      <div class="flex flex-col gap-2 feedback-submissions-filter-field">
        <label for="feedback-status-filter" class="font-medium text-base-content" data-i18n data-i18n-key="feedbackSubmissions.filters.status">الحالة</label>
        <select id="feedback-status-filter" class="ui-select select select-bordered w-full">
          <option value="" data-i18n data-i18n-key="feedbackSubmissions.filters.statusAll">كل الحالات</option>
          <option value="new" data-i18n data-i18n-key="feedbackSubmissions.status.new">جديد</option>
          <option value="reviewed" data-i18n data-i18n-key="feedbackSubmissions.status.reviewed">تمت المراجعة</option>
          <option value="follow_up_needed" data-i18n data-i18n-key="feedbackSubmissions.status.followUpNeeded">يحتاج متابعة</option>
          <option value="responded" data-i18n data-i18n-key="feedbackSubmissions.status.responded">تم الرد</option>
          <option value="closed" data-i18n data-i18n-key="feedbackSubmissions.status.closed">مغلق</option>
        </select>
      </div>
      <div class="flex flex-col gap-2 feedback-submissions-filter-field">
        <label for="feedback-rating-filter" class="font-medium text-base-content" data-i18n data-i18n-key="feedbackSubmissions.filters.rating">التقييم</label>
        <select id="feedback-rating-filter" class="ui-select select select-bordered w-full">
          <option value="" data-i18n data-i18n-key="feedbackSubmissions.filters.ratingAll">كل التقييمات</option>
          <option value="5">5 / 5</option>
          <option value="4">4 / 5</option>
          <option value="3">3 / 5</option>
          <option value="2">2 / 5</option>
          <option value="1">1 / 5</option>
        </select>
      </div>
      <div class="flex flex-col gap-2 feedback-submissions-filter-field">
        <label for="feedback-search-filter" class="font-medium text-base-content" data-i18n data-i18n-key="feedbackSubmissions.filters.search">بحث</label>
        <input id="feedback-search-filter" type="search" class="ui-input input input-bordered w-full" data-i18n data-i18n-placeholder-key="feedbackSubmissions.filters.searchPlaceholder" placeholder="ابحث بالاسم، البريد، الخدمة أو الكود">
      </div>
    </div>

    <div class="users-table-wrapper overflow-x-auto">
      <table class="table table-hover align-middle users-table feedback-submissions-table">
        <thead class="table-light users-table-head">
          <tr>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.code">الكود</th>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.customer">العميل</th>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.service">الخدمة</th>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.rating">التقييم</th>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.status">الحالة</th>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.followUp">المتابعة القادمة</th>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.createdAt">تاريخ الإنشاء</th>
            <th data-i18n data-i18n-key="feedbackSubmissions.table.actions">الإجراءات</th>
          </tr>
        </thead>
        <tbody id="feedback-submissions-body">
          <tr>
            <td colspan="8" class="text-center text-base-content/60" data-i18n data-i18n-key="feedbackSubmissions.table.loading">⏳ جارٍ تحميل التقييمات...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="feedback-submissions-pagination" class="list-pagination" hidden></div>
  </section>

  <section class="grid gap-6 xl:grid-cols-[minmax(0,1.2fr)_minmax(320px,.8fr)] feedback-submissions-content-grid" id="feedback-detail-card">
    <article class="ui-card ui-card--content glass-card feedback-submissions-detail-shell space-y-5">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div class="surface-heading-stack">
          <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="feedbackSubmissions.details.title">تفاصيل التقييم</h3>
          <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="feedbackSubmissions.details.subtitle">اختر تقييماً من الجدول لعرض التفاصيل الكاملة وتحديث إجراءات المتابعة.</p>
        </div>
        <span class="badge badge-outline" id="feedback-detail-status-badge">—</span>
      </div>
      <div id="feedback-detail-content" class="space-y-4">
        <div class="surface-empty-state p-6" data-i18n data-i18n-key="feedbackSubmissions.details.empty">اختر تقييماً من القائمة لبدء المتابعة.</div>
      </div>
    </article>

    <aside class="ui-card ui-card--content glass-card feedback-submissions-workflow-shell space-y-5">
      <div class="surface-heading-stack">
        <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="feedbackSubmissions.workflow.title">إدارة المتابعة</h3>
        <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="feedbackSubmissions.workflow.subtitle">حدّث الحالة، أضف ملاحظات الفريق، وحدد الخطوة التالية إذا كانت هناك متابعة.</p>
      </div>

      <div class="space-y-4" id="feedback-workflow">
        <div class="surface-empty-state p-6" data-i18n data-i18n-key="feedbackSubmissions.workflow.empty">اختر تقييماً أولاً لتظهر أدوات التحديث.</div>
      </div>

      <div class="space-y-3">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <h4 class="text-base font-semibold text-base-content" data-i18n data-i18n-key="feedbackSubmissions.activity.title">سجل النشاط</h4>
        </div>
        <div id="feedback-activity-list" class="space-y-3">
          <div class="surface-empty-state p-5" data-i18n data-i18n-key="feedbackSubmissions.activity.empty">لا يوجد نشاط بعد.</div>
        </div>
      </div>
    </aside>
  </section>
</template>
</html>
