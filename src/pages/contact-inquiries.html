<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- @include "./_partials/manager-page-head.html" {"titleKey":"contactInquiries.title","titleText":"إدارة رسائل التواصل"} -->
</head>
<!-- @include "./_partials/compact-manager-shell.html" {"bodyClass":"contact-inquiries-page","activePage":"contact-inquiries","greetingLabelKey":"contactInquiries.title","greetingLabelText":"إدارة رسائل التواصل","pageScript":"/src/scripts/contactInquiries.js"} -->
<template data-slot="greetingSummary">
  <p class="text-sm text-base-content/60" data-i18n data-i18n-key="contactInquiries.subtitle">تابع رسائل الموقع، حدّث حالتها، وسجّل خطوات التواصل مع العميل في مكان واحد.</p>
</template>
<template data-slot="greetingActions">
  <a href="#contact-inquiries-table-card" class="ui-button ui-button--primary btn btn-primary btn-sm" data-i18n data-i18n-key="contactInquiries.actions.openList">📋 فتح القائمة</a>
  <a href="#contact-inquiry-detail-card" class="ui-button ui-button--outline btn btn-outline btn-sm" data-i18n data-i18n-key="contactInquiries.actions.openDetails">🧾 فتح التفاصيل</a>
</template>
<template data-slot="mainContent">
  <section class="ui-card ui-card--content glass-card contact-inquiries-hero-shell space-y-2">
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div>
        <h2 class="text-2xl font-bold text-base-content" data-i18n data-i18n-key="contactInquiries.title">إدارة رسائل التواصل</h2>
        <p class="text-sm text-base-content/70" data-i18n data-i18n-key="contactInquiries.subtitle">تابع رسائل الموقع، حدّث حالتها، وسجّل خطوات التواصل مع العميل في مكان واحد.</p>
      </div>
      <button type="button" class="ui-button ui-button--outline btn btn-outline btn-sm" id="contact-inquiries-refresh" data-i18n data-i18n-key="actions.refresh">🔄 تحديث البيانات</button>
    </div>
  </section>

  <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4 contact-inquiries-stats-grid" id="contact-inquiries-stats">
    <article class="ui-stat-card compact-kpi-card contact-inquiries-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="contactInquiries.stats.new">جديدة</span>
      <span class="ui-stat-card__value" id="contact-stat-new">0</span>
    </article>
    <article class="ui-stat-card compact-kpi-card contact-inquiries-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="contactInquiries.stats.inProgress">قيد المتابعة</span>
      <span class="ui-stat-card__value" id="contact-stat-progress">0</span>
    </article>
    <article class="ui-stat-card compact-kpi-card contact-inquiries-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="contactInquiries.stats.followUpToday">متابعة اليوم</span>
      <span class="ui-stat-card__value" id="contact-stat-followup-today">0</span>
    </article>
    <article class="ui-stat-card compact-kpi-card contact-inquiries-stat-card">
      <span class="ui-stat-card__label" data-i18n data-i18n-key="contactInquiries.stats.closed">مغلقة</span>
      <span class="ui-stat-card__value" id="contact-stat-closed">0</span>
    </article>
  </section>

  <section class="ui-card ui-card--content glass-card contact-inquiries-table-shell space-y-5" id="contact-inquiries-table-card">
    <div class="grid gap-4 md:grid-cols-[220px_minmax(0,1fr)] contact-inquiries-filter-grid">
      <div class="flex flex-col gap-2 contact-inquiries-filter-field">
        <label for="contact-status-filter" class="font-medium text-base-content" data-i18n data-i18n-key="contactInquiries.filters.status">الحالة</label>
        <select id="contact-status-filter" class="ui-select select select-bordered w-full">
          <option value="" data-i18n data-i18n-key="contactInquiries.filters.statusAll">كل الحالات</option>
          <option value="new" data-i18n data-i18n-key="contactInquiries.status.new">جديدة</option>
          <option value="in_progress" data-i18n data-i18n-key="contactInquiries.status.inProgress">قيد المتابعة</option>
          <option value="contacted" data-i18n data-i18n-key="contactInquiries.status.contacted">تم التواصل</option>
          <option value="won" data-i18n data-i18n-key="contactInquiries.status.won">تم التحويل</option>
          <option value="lost" data-i18n data-i18n-key="contactInquiries.status.lost">مفقودة</option>
          <option value="closed" data-i18n data-i18n-key="contactInquiries.status.closed">مغلقة</option>
        </select>
      </div>
      <div class="flex flex-col gap-2 contact-inquiries-filter-field">
        <label for="contact-search-filter" class="font-medium text-base-content" data-i18n data-i18n-key="contactInquiries.filters.search">بحث</label>
        <input id="contact-search-filter" type="search" class="ui-input input input-bordered w-full" data-i18n data-i18n-placeholder-key="contactInquiries.filters.searchPlaceholder" placeholder="ابحث بالاسم، البريد، الجوال أو الكود">
      </div>
    </div>

    <div class="users-table-wrapper overflow-x-auto">
      <table class="table table-hover align-middle users-table">
        <thead class="table-light users-table-head">
          <tr>
            <th data-i18n data-i18n-key="contactInquiries.table.code">الكود</th>
            <th data-i18n data-i18n-key="contactInquiries.table.customer">العميل</th>
            <th data-i18n data-i18n-key="contactInquiries.table.contact">التواصل</th>
            <th data-i18n data-i18n-key="contactInquiries.table.project">المشروع</th>
            <th data-i18n data-i18n-key="contactInquiries.table.status">الحالة</th>
            <th data-i18n data-i18n-key="contactInquiries.table.followUp">المتابعة القادمة</th>
            <th data-i18n data-i18n-key="contactInquiries.table.createdAt">تاريخ الإنشاء</th>
            <th data-i18n data-i18n-key="contactInquiries.table.actions">الإجراءات</th>
          </tr>
        </thead>
        <tbody id="contact-inquiries-body">
          <tr>
            <td colspan="8" class="text-center text-base-content/60" data-i18n data-i18n-key="contactInquiries.table.loading">⏳ جارٍ تحميل الرسائل...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="contact-inquiries-pagination" class="list-pagination" hidden></div>
  </section>

  <section class="grid gap-6 xl:grid-cols-[minmax(0,1.2fr)_minmax(320px,.8fr)] contact-inquiries-content-grid" id="contact-inquiry-detail-card">
    <article class="ui-card ui-card--content glass-card contact-inquiries-detail-shell space-y-5">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <div class="surface-heading-stack">
          <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="contactInquiries.details.title">تفاصيل الرسالة</h3>
          <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="contactInquiries.details.subtitle">اختَر رسالة من الجدول لعرض البيانات الكاملة وتحديث سير المتابعة.</p>
        </div>
        <span class="contact-inquiries-status-badge status-chip status-completed" id="contact-detail-status-badge">—</span>
      </div>
      <div id="contact-inquiry-detail-content" class="space-y-4">
        <div class="ui-empty-state surface-empty-state p-6" data-i18n data-i18n-key="contactInquiries.details.empty">اختر رسالة من القائمة لبدء المتابعة.</div>
      </div>
    </article>

    <aside class="ui-card ui-card--content glass-card contact-inquiries-workflow-shell space-y-5">
      <div class="surface-heading-stack">
        <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="contactInquiries.workflow.title">إدارة المتابعة</h3>
        <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="contactInquiries.workflow.subtitle">حدّث الحالة، سجّل ملاحظاتك، وحدد موعد الخطوة القادمة.</p>
      </div>

      <div class="space-y-4" id="contact-inquiry-workflow">
        <div class="ui-empty-state surface-empty-state p-6" data-i18n data-i18n-key="contactInquiries.workflow.empty">اختر رسالة أولاً لتظهر أدوات التحديث.</div>
      </div>

      <div class="space-y-3">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <h4 class="text-base font-semibold text-base-content" data-i18n data-i18n-key="contactInquiries.activity.title">سجل النشاط</h4>
        </div>
        <div id="contact-inquiry-activity-list" class="space-y-3">
          <div class="ui-empty-state surface-empty-state p-5" data-i18n data-i18n-key="contactInquiries.activity.empty">لا يوجد نشاط بعد.</div>
        </div>
      </div>
    </aside>
  </section>
</template>
</html>
