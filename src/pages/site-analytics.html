<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- @include "./_partials/manager-page-head.html" {"titleKey":"siteAnalytics.title","titleText":"إحصائيات الموقع"} -->
</head>
<!-- @include "./_partials/compact-manager-shell.html" {"bodyClass":"site-analytics-page","activePage":"site-analytics","greetingLabelKey":"siteAnalytics.title","greetingLabelText":"إحصائيات الموقع","pageScript":"/src/scripts/siteAnalytics.js"} -->
<template data-slot="greetingSummary">
  <p class="text-sm text-base-content/60" data-i18n data-i18n-key="siteAnalytics.subtitle">تابع عدد الزوار، الصفحات الأكثر زيارة، ومصادر الزيارات في لوحة مختصرة وواضحة.</p>
</template>
<template data-slot="greetingActions">
  <a href="#site-analytics-top-pages" class="ui-button ui-button--primary btn btn-primary btn-sm" data-i18n data-i18n-key="siteAnalytics.actions.openPages">📄 أعلى الصفحات</a>
  <a href="#site-analytics-daily-card" class="ui-button ui-button--outline btn btn-outline btn-sm" data-i18n data-i18n-key="siteAnalytics.actions.openDaily">📅 الزيارات اليومية</a>
</template>
<template data-slot="mainContent">
  <section class="ui-card ui-card--content glass-card compact-hero-card site-analytics-hero-shell space-y-5">
    <div class="compact-hero-layout">
      <div class="compact-hero-copy">
        <span class="compact-surface-kicker" data-i18n data-i18n-key="home.analytics.title">📈 إحصائيات الموقع</span>
        <h2 class="text-2xl font-bold text-base-content" data-i18n data-i18n-key="siteAnalytics.title">إحصائيات الموقع</h2>
        <p class="text-sm text-base-content/70" data-i18n data-i18n-key="siteAnalytics.subtitle">تابع عدد الزوار، الصفحات الأكثر زيارة، ومصادر الزيارات في لوحة مختصرة وواضحة.</p>
        <div class="compact-inline-meta" id="site-analytics-range-label"></div>
      </div>
      <div class="compact-filter-toolbar">
        <div class="compact-filter-grid">
        <label class="compact-filter-field">
          <span class="text-sm font-medium text-base-content" data-i18n data-i18n-key="siteAnalytics.filters.range">الفترة</span>
          <select id="site-analytics-range" class="ui-select select select-bordered select-sm min-w-[150px]">
            <option value="7" data-i18n data-i18n-key="siteAnalytics.filters.range7">آخر 7 أيام</option>
            <option value="30" selected data-i18n data-i18n-key="siteAnalytics.filters.range30">آخر 30 يوم</option>
            <option value="90" data-i18n data-i18n-key="siteAnalytics.filters.range90">آخر 90 يوم</option>
          </select>
        </label>
        <label class="compact-filter-field">
          <span class="text-sm font-medium text-base-content" data-i18n data-i18n-key="siteAnalytics.filters.pageType">نوع الصفحة</span>
          <select id="site-analytics-page-type" class="ui-select select select-bordered select-sm min-w-[170px]">
            <option value="" data-i18n data-i18n-key="siteAnalytics.filters.allPageTypes">كل الصفحات</option>
          </select>
        </label>
        <label class="compact-filter-field">
          <span class="text-sm font-medium text-base-content" data-i18n data-i18n-key="siteAnalytics.filters.device">الجهاز</span>
          <select id="site-analytics-device-type" class="ui-select select select-bordered select-sm min-w-[150px]">
            <option value="" data-i18n data-i18n-key="siteAnalytics.filters.allDevices">كل الأجهزة</option>
            <option value="desktop" data-i18n data-i18n-key="siteAnalytics.devices.desktop">سطح المكتب</option>
            <option value="mobile" data-i18n data-i18n-key="siteAnalytics.devices.mobile">جوال</option>
            <option value="tablet" data-i18n data-i18n-key="siteAnalytics.devices.tablet">تابلت</option>
          </select>
        </label>
        <label class="compact-filter-field">
          <span class="text-sm font-medium text-base-content" data-i18n data-i18n-key="siteAnalytics.filters.source">المصدر</span>
          <select id="site-analytics-source-type" class="ui-select select select-bordered select-sm min-w-[150px]">
            <option value="" data-i18n data-i18n-key="siteAnalytics.filters.allSources">كل المصادر</option>
            <option value="direct" data-i18n data-i18n-key="siteAnalytics.sources.direct">دخول مباشر</option>
            <option value="external" data-i18n data-i18n-key="siteAnalytics.filters.sourceExternal">خارجي</option>
            <option value="internal" data-i18n data-i18n-key="siteAnalytics.sources.internal">تنقل داخلي</option>
          </select>
        </label>
        </div>
        <div class="compact-filter-actions">
        <label class="compact-inline-toggle">
          <input id="site-analytics-include-internal" type="checkbox" class="checkbox checkbox-sm">
          <span data-i18n data-i18n-key="siteAnalytics.filters.includeInternal">إظهار زيارات الفريق الداخلي</span>
        </label>
        <button type="button" class="ui-button ui-button--outline btn btn-outline btn-sm" id="site-analytics-refresh" data-i18n data-i18n-key="actions.refresh">🔄 تحديث البيانات</button>
      </div>
    </div>
    </div>
  </section>

  <section class="compact-kpi-grid site-analytics-stats-grid" id="site-analytics-stats">
    <article class="ui-card ui-card--content glass-card ui-stat-card compact-kpi-card site-analytics-stat-card">
      <div class="compact-kpi-card__label" data-i18n data-i18n-key="siteAnalytics.stats.visitors">الزوار</div>
      <div class="compact-kpi-card__value" id="analytics-stat-visitors">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card compact-kpi-card site-analytics-stat-card">
      <div class="compact-kpi-card__label" data-i18n data-i18n-key="siteAnalytics.stats.sessions">الجلسات</div>
      <div class="compact-kpi-card__value" id="analytics-stat-sessions">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card compact-kpi-card site-analytics-stat-card">
      <div class="compact-kpi-card__label" data-i18n data-i18n-key="siteAnalytics.stats.pageViews">مشاهدات الصفحات</div>
      <div class="compact-kpi-card__value" id="analytics-stat-page-views">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card compact-kpi-card site-analytics-stat-card">
      <div class="compact-kpi-card__label" data-i18n data-i18n-key="siteAnalytics.stats.avgPages">متوسط الصفحات لكل جلسة</div>
      <div class="compact-kpi-card__value" id="analytics-stat-avg-pages">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card compact-kpi-card site-analytics-stat-card">
      <div class="compact-kpi-card__label" data-i18n data-i18n-key="siteAnalytics.stats.contactLeads">رسائل التواصل</div>
      <div class="compact-kpi-card__value" id="analytics-stat-contact-leads">0</div>
    </article>
    <article class="ui-card ui-card--content glass-card ui-stat-card compact-kpi-card site-analytics-stat-card">
      <div class="compact-kpi-card__label" data-i18n data-i18n-key="siteAnalytics.stats.feedback">آراء العملاء</div>
      <div class="compact-kpi-card__value" id="analytics-stat-feedback">0</div>
    </article>
  </section>

  <section class="grid gap-6 xl:grid-cols-[minmax(0,1.3fr)_minmax(320px,.7fr)] site-analytics-content-grid">
    <article class="ui-card ui-card--content glass-card compact-surface-panel site-analytics-section-shell space-y-4" id="site-analytics-top-pages">
      <div class="surface-heading-stack">
        <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="siteAnalytics.topPages.title">الصفحات الأكثر زيارة</h3>
        <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="siteAnalytics.topPages.subtitle">الصفحات التي جذبت أكبر عدد من الزيارات خلال الفترة المحددة.</p>
      </div>
      <div class="ui-table-shell users-table-wrapper compact-table-shell overflow-x-auto">
        <table class="ui-table compact-table table table-hover align-middle text-nowrap users-table">
          <thead class="table-light users-table-head">
            <tr>
              <th data-i18n data-i18n-key="siteAnalytics.topPages.table.page">الصفحة</th>
              <th data-i18n data-i18n-key="siteAnalytics.topPages.table.views">المشاهدات</th>
              <th data-i18n data-i18n-key="siteAnalytics.topPages.table.visitors">الزوار</th>
              <th data-i18n data-i18n-key="siteAnalytics.topPages.table.sessions">الجلسات</th>
              <th data-i18n data-i18n-key="siteAnalytics.topPages.table.lastVisit">آخر زيارة</th>
            </tr>
          </thead>
          <tbody id="site-analytics-top-pages-body">
            <tr>
              <td colspan="5" class="text-center text-base-content/60" data-i18n data-i18n-key="siteAnalytics.loading">⏳ جارٍ تحميل الإحصائيات...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </article>

    <div class="compact-card-stack">
      <aside class="ui-card ui-card--content glass-card compact-surface-panel site-analytics-section-shell space-y-4">
        <div class="surface-heading-stack">
          <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="siteAnalytics.sources.title">مصادر الزيارات</h3>
          <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="siteAnalytics.sources.subtitle">من أين يصل الزوار إلى الموقع.</p>
        </div>
        <div class="compact-card-stack" id="site-analytics-sources-list">
          <div class="ui-empty-state surface-empty-state p-5" data-i18n data-i18n-key="siteAnalytics.loading">⏳ جارٍ تحميل الإحصائيات...</div>
        </div>
      </aside>

      <aside class="ui-card ui-card--content glass-card compact-surface-panel site-analytics-section-shell space-y-4">
        <div class="surface-heading-stack">
          <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="siteAnalytics.devices.title">الأجهزة</h3>
          <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="siteAnalytics.devices.subtitle">توزيع الزيارات بين الجوال، التابلت، وسطح المكتب.</p>
        </div>
        <div class="compact-kpi-grid compact-kpi-grid--mini" id="site-analytics-devices-grid">
          <div class="ui-empty-state surface-empty-state p-5 sm:col-span-3" data-i18n data-i18n-key="siteAnalytics.loading">⏳ جارٍ تحميل الإحصائيات...</div>
        </div>
      </aside>
    </div>
  </section>

  <section class="ui-card ui-card--content glass-card compact-surface-panel site-analytics-section-shell space-y-4" id="site-analytics-daily-card">
    <div class="surface-heading-stack">
      <h3 class="text-xl font-semibold text-base-content" data-i18n data-i18n-key="siteAnalytics.daily.title">الزيارات اليومية</h3>
      <p class="surface-support-text surface-support-text--compact" data-i18n data-i18n-key="siteAnalytics.daily.subtitle">مخطط مبسط يوضح نشاط الموقع يومًا بيوم.</p>
    </div>
    <div class="compact-card-stack" id="site-analytics-daily-list">
      <div class="ui-empty-state surface-empty-state p-5" data-i18n data-i18n-key="siteAnalytics.loading">⏳ جارٍ تحميل الإحصائيات...</div>
    </div>
  </section>
</template>
</html>
