<template data-slot="mainContent">
  <div class="tab-content-wrapper">
<div class="tab active" id="equipment-tab" role="tabpanel" aria-labelledby="equipment-page-section-title" tabindex="0">
        <!-- زر العودة للأعلى (يظهر فقط عند السحب لأسفل داخل تبويب المعدات) -->
        <button id="equipment-back-to-top" class="back-to-top-btn" type="button" aria-label="العودة إلى أعلى الصفحة" title="⬆️ للأعلى" data-i18n data-i18n-aria-label-key="equipment.backToTop.ariaLabel" data-i18n-title-key="equipment.backToTop.title" hidden>
          <span class="back-to-top-btn__icon" aria-hidden="true">↑</span>
        </button>
        <button
          id="equipment-floating-return"
          class="ui-button ui-button--primary equipment-return-btn btn btn-primary btn-lg"
          type="button"
          data-i18n
          data-i18n-key="reservations.create.equipment.selector.returnButton"
          hidden>
          ⬅️ العودة إلى الحجز
        </button>
        <div class="tab-section-header">
          <h2 class="tab-section-title" id="equipment-page-section-title" data-i18n data-i18n-key="equipment.section.title">🎥 إدارة المعدات</h2>
          <p class="section-support-text" data-i18n data-i18n-key="equipment.section.support">أدر كتالوج المعدات والحزم من نفس السطح قبل استخدامها في الحجوزات أو متابعة الصيانة.</p>
        </div>
        <div class="tab-section-toolbar d-flex flex-wrap align-items-center justify-content-center justify-content-lg-between gap-2 mb-4">
          <div class="d-flex flex-wrap gap-2">
            <button type="button" id="equipment-clear-btn" class="ui-button ui-button--danger btn btn-error btn-sm requires-admin" data-i18n data-i18n-key="equipment.actions.clearAll">🗑️ مسح الكل</button>
            <button type="button" id="excel-upload-trigger" class="ui-button ui-button--primary btn btn-primary btn-sm requires-admin" data-i18n data-i18n-key="equipment.actions.uploadExcel">📤 رفع من Excel</button>
            <button type="button" id="excel-download-trigger" class="ui-button ui-button--outline btn btn-outline btn-sm" data-i18n data-i18n-key="equipment.actions.downloadExcel">📥 تنزيل Excel</button>
          </div>
          <div class="d-none">
            <input type="file" id="excel-upload" accept=".xlsx, .xls" hidden class="requires-admin">
          </div>
        </div>

        <div class="ui-card ui-card--content glass-card equipment-form-box equipment-embedded-form-card management-form-box mb-4">
          <div class="management-form-header">
            <div class="management-form-icon">🎥</div>
            <div class="management-form-header-text">
              <h4 data-i18n data-i18n-key="equipment.form.title">إضافة معدة</h4>
              <p class="management-form-hint" data-i18n data-i18n-key="equipment.form.hint">أدخل بيانات المعدة ليتم حفظها ضمن قائمة المعدات.</p>
            </div>
          </div>
          <form id="add-equipment-form" class="management-form">
            <div class="equipment-embedded-form-layout">
              <div class="equipment-embedded-form-main">
                <section class="equipment-form-section-card">
                  <div class="equipment-form-section-card__header">
                    <h5 class="equipment-form-section-card__title" data-i18n data-i18n-key="equipment.form.sections.identity.title">بيانات المعدّة</h5>
                    <p class="equipment-form-section-card__hint" data-i18n data-i18n-key="equipment.form.sections.identity.hint">ابدأ بوصف المعدّة وتعريفها بالباركود حتى يسهل العثور عليها لاحقًا.</p>
                  </div>
                  <div class="management-form-grid equipment-embedded-form-grid equipment-embedded-form-grid--identity">
                    <div class="form-field form-field--full">
                      <label for="new-equipment-desc" class="form-label" data-i18n data-i18n-key="equipment.form.labels.description">📝 الوصف</label>
                      <input type="text" class="ui-input form-control" id="new-equipment-desc" placeholder="وصف المعدة" required data-i18n data-i18n-placeholder-key="equipment.form.placeholders.description">
                    </div>
                    <div class="form-field form-field--full">
                      <label for="new-equipment-barcode" class="form-label" data-i18n data-i18n-key="equipment.form.labels.barcode">🏷️ الباركود</label>
                      <div class="equipment-barcode-field">
                        <input type="text" class="ui-input form-control" id="new-equipment-barcode" placeholder="الباركود" required data-i18n data-i18n-placeholder-key="equipment.form.placeholders.barcode">
                        <button type="button" id="generate-equipment-barcode" class="ui-button ui-button--outline btn btn-outline btn-sm" title="توليد باركود" data-i18n data-i18n-key="equipment.form.actions.generate" data-i18n-title-key="equipment.form.actions.generateBarcodeTitle">🎲 توليد</button>
                      </div>
                    </div>
                  </div>
                </section>

                <section class="equipment-form-section-card equipment-form-section-card--pricing">
                  <div class="equipment-form-section-card__header">
                    <h5 class="equipment-form-section-card__title" data-i18n data-i18n-key="equipment.form.sections.pricing.title">التسعير</h5>
                    <p class="equipment-form-section-card__hint" data-i18n data-i18n-key="equipment.form.sections.pricing.hint">أدخل سعر البيع والتكلفة حتى تبقى بيانات المعدّة التجارية واضحة من البداية.</p>
                  </div>
                  <div class="management-form-grid equipment-embedded-form-grid equipment-embedded-form-grid--pricing">
                    <div class="form-field">
                      <label for="new-equipment-price" class="form-label" data-i18n data-i18n-key="equipment.form.labels.price">💵 السعر</label>
                      <input type="number" class="ui-input form-control" id="new-equipment-price" placeholder="0" min="0" step="0.01" data-i18n data-i18n-placeholder-key="equipment.form.placeholders.price">
                    </div>
                    <div class="form-field">
                      <label for="new-equipment-cost" class="form-label" data-i18n data-i18n-key="equipment.form.labels.cost">💸 التكلفة</label>
                      <input type="number" class="ui-input form-control" id="new-equipment-cost" placeholder="0" min="0" step="0.01" data-i18n data-i18n-placeholder-key="equipment.form.placeholders.cost">
                    </div>
                  </div>
                </section>
              </div>
              <aside class="equipment-embedded-form-side">
                <div class="equipment-embedded-form-side-card">
                  <div class="equipment-form-section-card__header">
                    <h5 class="equipment-form-section-card__title" data-i18n data-i18n-key="equipment.form.sections.catalog.title">التصنيف والمصدر</h5>
                    <p class="equipment-form-section-card__hint" data-i18n data-i18n-key="equipment.form.sections.catalog.hint">أضف الصورة والقسم والمؤجر لتظهر المعدّة بشكل منظّم داخل الكتالوج والحجوزات.</p>
                  </div>
                  <div class="form-field">
                    <label for="new-equipment-image" class="form-label" data-i18n data-i18n-key="equipment.form.labels.image">🖼️ رابط الصورة</label>
                    <input type="text" class="ui-input form-control" id="new-equipment-image" placeholder="https://..." data-i18n data-i18n-placeholder-key="equipment.form.placeholders.image">
                  </div>
                  <div class="form-field">
                    <label for="new-equipment-category" class="form-label" data-i18n data-i18n-key="equipment.form.labels.category">📂 القسم</label>
                    <input type="text" class="ui-input form-control" id="new-equipment-category" placeholder="القسم" data-i18n data-i18n-placeholder-key="equipment.form.placeholders.category" list="new-equipment-category-list">
                    <datalist id="new-equipment-category-list"></datalist>
                  </div>
                  <div class="form-field">
                    <label for="new-equipment-sub" class="form-label" data-i18n data-i18n-key="equipment.form.labels.subcategory">📑 القسم الثانوي</label>
                    <input type="text" class="ui-input form-control" id="new-equipment-sub" placeholder="القسم الثانوي" data-i18n data-i18n-placeholder-key="equipment.form.placeholders.subcategory" list="new-equipment-sub-list">
                    <datalist id="new-equipment-sub-list"></datalist>
                  </div>
                  <div class="form-field">
                    <label for="new-equipment-lessor" class="form-label" data-i18n data-i18n-key="equipment.form.labels.lessor">🏢 المؤجر</label>
                    <input type="text" class="ui-input form-control" id="new-equipment-lessor" placeholder="اسم المؤجر" data-i18n data-i18n-placeholder-key="equipment.form.placeholders.lessor" list="new-equipment-lessor-list">
                    <datalist id="new-equipment-lessor-list"></datalist>
                  </div>
                </div>
              </aside>
            </div>
            <div class="management-form-actions equipment-form-actions">
              <button type="submit" class="ui-button ui-button--primary btn btn-primary" data-i18n data-i18n-key="equipment.form.actions.submit">➕ إضافة معدة</button>
            </div>
          </form>
        </div>

        <div class="ui-card ui-card--content glass-card equipment-packages-box equipment-package-management-card management-form-box mb-4">
          <div class="management-form-header">
            <div class="management-form-icon">📦</div>
            <div class="management-form-header-text">
              <h4 data-i18n data-i18n-key="equipment.packages.form.title">إدارة الحزم</h4>
              <p class="management-form-hint" data-i18n data-i18n-key="equipment.packages.form.hint">قم بتجميع عدة معدات في حزمة واحدة لتسهيل إضافتها للحجوزات.</p>
            </div>
          </div>

          <form id="equipment-package-form" class="management-form">
            <input type="hidden" id="equipment-package-id" value="">
            <div class="equipment-package-form-layout">
              <section class="equipment-form-section-card equipment-package-form-section-card equipment-package-form-section-card--identity">
                <div class="equipment-form-section-card__header">
                  <h5 class="equipment-form-section-card__title" data-i18n data-i18n-key="equipment.packages.form.sections.identity.title">تعريف الحزمة</h5>
                  <p class="equipment-form-section-card__hint" data-i18n data-i18n-key="equipment.packages.form.sections.identity.hint">ابدأ باسم واضح وكود ثابت حتى يسهل العثور على الحزمة واستخدامها داخل الحجوزات.</p>
                </div>
                <div class="management-form-grid equipment-package-form-grid equipment-package-form-grid--identity">
                  <div class="form-field">
                    <label for="equipment-package-name" class="form-label" data-i18n data-i18n-key="equipment.packages.form.labels.name">🧾 اسم الحزمة</label>
                    <input type="text" class="ui-input form-control" id="equipment-package-name" placeholder="مثال: طقم تصوير أساسي" required data-i18n data-i18n-placeholder-key="equipment.packages.form.placeholders.name">
                  </div>
                  <div class="form-field">
                    <label for="equipment-package-code" class="form-label" data-i18n data-i18n-key="equipment.packages.form.labels.code">🔖 كود الحزمة</label>
                    <input type="text" class="ui-input form-control" id="equipment-package-code" placeholder="standard-kit" required data-i18n data-i18n-placeholder-key="equipment.packages.form.placeholders.code">
                  </div>
                  <div class="form-field form-field--wide">
                    <label for="equipment-package-description" class="form-label" data-i18n data-i18n-key="equipment.packages.form.labels.description">📝 الوصف</label>
                    <textarea class="ui-textarea form-control equipment-package-description" id="equipment-package-description" rows="3" placeholder="تفاصيل إضافية عن الحزمة" data-i18n data-i18n-placeholder-key="equipment.packages.form.placeholders.description"></textarea>
                  </div>
                </div>
              </section>

              <section class="equipment-form-section-card equipment-package-form-section-card equipment-package-form-section-card--pricing">
                <div class="equipment-form-section-card__header">
                  <h5 class="equipment-form-section-card__title" data-i18n data-i18n-key="equipment.packages.form.sections.pricing.title">التسعير والتكلفة</h5>
                  <p class="equipment-form-section-card__hint" data-i18n data-i18n-key="equipment.packages.form.sections.pricing.hint">حدّد سعر الحزمة وتكلفتها قبل إضافة عناصرها الفعلية.</p>
                </div>
                <div class="equipment-package-pricing-shell">
                  <div class="management-form-grid equipment-package-form-grid equipment-package-form-grid--pricing">
                    <div class="form-field">
                      <label for="equipment-package-price" class="form-label" data-i18n data-i18n-key="equipment.packages.form.labels.price">💵 سعر الحزمة</label>
                      <input type="text" class="ui-input form-control" id="equipment-package-price" inputmode="decimal" placeholder="0" data-i18n data-i18n-placeholder-key="equipment.packages.form.placeholders.price">
                    </div>
                    <div class="form-field">
                      <label for="equipment-package-cost" class="form-label" data-i18n data-i18n-key="equipment.packages.form.labels.cost">💰 تكلفة الحزمة</label>
                      <input type="text" class="ui-input form-control" id="equipment-package-cost" inputmode="decimal" placeholder="0" data-i18n data-i18n-placeholder-key="equipment.packages.form.placeholders.cost">
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <div class="equipment-package-items-editor">
              <div class="equipment-form-section-card__header">
                <h5 class="equipment-package-items-title equipment-form-section-card__title" data-i18n data-i18n-key="equipment.packages.items.title">🧰 عناصر الحزمة</h5>
                <p class="equipment-form-section-card__hint" data-i18n data-i18n-key="equipment.packages.items.hint">اختر العناصر التي تكوّن الحزمة من قائمة المعدات ثم راجعها هنا قبل الحفظ.</p>
              </div>

              <div class="equipment-package-selection-controls">
                <button type="button" class="ui-button ui-button--outline btn btn-outline-primary" id="equipment-package-open-selector" data-i18n data-i18n-key="equipment.packages.selection.open">🎥 اختيار من قائمة المعدات</button>

                <div class="equipment-package-selection-active" id="equipment-package-selection-active" hidden>
                  <span id="equipment-package-selection-counter" data-i18n data-i18n-key="equipment.packages.selection.counter">لم يتم اختيار عناصر بعد.</span>
                  <div class="equipment-package-selection-buttons">
                    <button type="button" class="ui-button ui-button--primary btn btn-primary btn-sm" id="equipment-package-apply-selection" data-i18n data-i18n-key="equipment.packages.selection.apply">✅ إضافة العناصر للحزمة</button>
                    <button type="button" class="ui-button ui-button--secondary btn btn-secondary btn-sm" id="equipment-package-cancel-selection" data-i18n data-i18n-key="equipment.packages.selection.cancel">✖️ إلغاء</button>
                  </div>
                </div>
              </div>

              <div class="users-table-wrapper overflow-x-auto embedded-management-table-shell equipment-package-items-table-wrapper">
                <table class="ui-table table table-hover users-table surface-table embedded-management-table align-middle equipment-package-items-table" id="equipment-package-items-table">
                  <thead class="table-light">
                    <tr>
                      <th data-i18n data-i18n-key="equipment.packages.items.table.equipment">المعدة</th>
                      <th data-i18n data-i18n-key="equipment.packages.items.table.quantity">الكمية</th>
                      <th data-i18n data-i18n-key="equipment.packages.items.table.actions">الإجراءات</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr id="equipment-package-items-empty">
                      <td colspan="3" class="projects-table-empty-row text-center text-muted" data-i18n data-i18n-key="equipment.packages.items.empty">لم يتم إضافة عناصر إلى الحزمة بعد.</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div class="management-form-actions equipment-package-form-actions">
              <button type="submit" class="ui-button ui-button--primary btn btn-primary" id="equipment-package-submit" data-i18n data-i18n-key="equipment.packages.form.actions.save">💾 حفظ الحزمة</button>
              <button type="button" class="ui-button ui-button--secondary btn btn-secondary" id="equipment-package-reset" data-i18n data-i18n-key="equipment.packages.form.actions.reset">↩️ إعادة التعيين</button>
            </div>
          </form>
        </div>

        <section class="ui-card ui-card--content glass-card equipment-packages-list-box equipment-records-card mb-4">
          <div class="projects-table__header equipment-records-card__header">
            <div class="project-list-section-header equipment-records-card__heading">
              <div class="surface-heading-stack">
                <h3 class="mb-0" data-i18n data-i18n-key="equipment.packages.list.title">📋 قائمة الحزم</h3>
                <p class="section-support-text mb-0" data-i18n data-i18n-key="equipment.packages.list.hint">راجع الحزم الجاهزة ونظّمها قبل استخدامها داخل الحجوزات أو البناء السريع للعناصر.</p>
              </div>
              <span class="projects-table__count ui-badge ui-badge--soft badge-soft equipment-records-card__count" id="equipment-packages-count">0</span>
            </div>
          </div>
          <div class="users-table-wrapper overflow-x-auto embedded-management-table-shell equipment-packages-table-wrapper">
            <table class="ui-table table table-hover users-table surface-table embedded-management-table align-middle equipment-packages-table" id="equipment-packages-table">
              <thead class="table-light">
                <tr>
                  <th data-i18n data-i18n-key="equipment.packages.list.table.name">الحزمة</th>
                  <th data-i18n data-i18n-key="equipment.packages.list.table.code">الكود</th>
                  <th data-i18n data-i18n-key="equipment.packages.list.table.price">السعر</th>
                  <th data-i18n data-i18n-key="equipment.packages.list.table.cost">التكلفة</th>
                  <th data-i18n data-i18n-key="equipment.packages.list.table.items">عدد العناصر</th>
                  <th data-i18n data-i18n-key="equipment.packages.list.table.actions">الإجراءات</th>
                </tr>
              </thead>
              <tbody id="equipment-packages-table-body">
                <tr id="equipment-packages-empty-row">
                  <td colspan="6" class="projects-table-empty-row text-center text-muted" data-i18n data-i18n-key="equipment.packages.list.empty">لا توجد حزم مضافة حالياً.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <div id="equipment-selection-banner" class="equipment-selection-banner" hidden>
          <div class="equipment-selection-banner__content">
            <div class="equipment-selection-banner__copy">
              <span id="equipment-selection-banner-title" class="equipment-selection-banner__title" data-i18n data-i18n-key="reservations.create.equipment.selector.bannerTitle">🔗 اختيار معدات لحجز جديد</span>
              <p id="equipment-selection-banner-hint" class="equipment-selection-banner__hint" data-i18n data-i18n-key="reservations.create.equipment.selector.bannerHint">ابحث في القائمة أدناه، ثم أضف المعدات المتاحة مباشرة إلى نموذج الحجز.</p>
            </div>
            <div class="equipment-selection-banner__actions">
              <button type="button" class="ui-button ui-button--primary btn btn-primary btn-sm" id="equipment-selection-return" data-i18n data-i18n-key="reservations.create.equipment.selector.returnButton">⬅️ العودة إلى الحجز</button>
            </div>
          </div>
        </div>

        <!-- ✅ البحث والفلترة -->
        <!-- ✅ قائمة المعدات -->
        <section class="ui-card ui-card--content glass-card equipment-list-box equipment-records-card">
          <div class="projects-table__header equipment-records-card__header">
